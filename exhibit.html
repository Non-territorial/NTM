<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonterritorial Museum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <main>
        <img src="https://i.imgur.com/t0Yegv9.png" alt="glasses">
        <h1 class="museum">NONTERRITORIAL MUSEUM</h1>
       <section>
         <button class="ex">EXHIBIT</button>
       </section>
       <section>
         <form method="post" action="https://script.google.com/macros/s/AKfycbw9EacXWoZHtuOK-6cpJmzcC0dfRLxnY_4KLmBIvCUZPUU_z7HhxCBWObn008oJFHbm/exec">
          <input type="hidden" name="type" value="exhibit" />
             <p>Apply here for exhibitor role. We will review your work and let you know if it is eligible to become a NTM Exhibiton</p>
            <fieldset>
                <label for="name">
                    Your Name:
                    <input id="name" name="name" type="text" placeholder="Full name" required />
                  </label>

                  <label for="email">
                    Enter Your Email:
                    <input id="email" name="email" type="email"  placeholder="Enter valid email" required />
                  </label>
          
                  <label for="ton-wallet">
                    TON Wallet:
                    <input id="ton-wallet" name="ton-wallet" type="text" pattern="[a-zA-Z0-9_-]{48,64}"
                    title="Please enter a valid TON wallet address (48-64 characters, letters, numbers, hyphens, and underscores)."
                    required />
                  </label>

                  <label for="work-link-1">
                    Link to your work #1:
                    <input
                      id="work-link-1"
                      name="work-links"
                      type="url"
                      placeholder="Paste one or more url linking to your work"
                      required
                    />
                  </label>
              
                  <label for="work-link-2">
                    Link to your work #2:
                    <input
                      id="work-link-2"
                      name="work-links"
                      type="url"
                    />
                  </label>
              
                  <label for="work-link-3">
                    Link to your work #3:
                    <input
                      id="work-link-3"
                      name="work-links"
                      type="url"
                    />
                  </label>

                  <input type="hidden" name="status" value="pending" />
                      
                <label for="terms-and-conditions">
                  <input class="inline" id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" />
                  I accept the
                  <a href="nonterritorial.foundation">terms and conditions</a>
                </label>
          
                <input type="submit" value="Submit" />
            </fieldset>
        </form>
          
        </section>
        <section class="little-buttons">
            <a href="index.html"><button class="home">Home</button></a>
            <a href="about.html"><button class="about">About</button></a>
            <a href="roadmap.html"><button class="roadmap">Roadmap</button></a>
            <a href="qa.html"><button class="qa">Q&A</button></a>
        </section>
    </main>
    <footer>
        <img src="https://i.imgur.com/sryvdsl.png" alt="Logo" class="logo"> 
    </footer>    
</div>
</body>
</html>
