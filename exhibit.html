<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonterritorial Museum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <main>
        <img src="https://i.imgur.com/t0Yegv9.png" alt="glasses">
        <h1 class="museum">NONTERRITORIAL MUSEUM</h1>
       <section>
         <button class="ex">EXHIBIT</button>
       </section>
       <section>
         <form method="post" action="https://script.google.com/macros/s/AKfycbxnRFAuuw7u7dSQJj8VEjBRnNDPhsNFj5lxMn8E6A9shufpROcak2GpGMQF4JxKY8CF/exec">
   
            <fieldset>
                <label for="name">
                    Your Name:
                    <input id="name" name="name" type="text" placeholder="Same name you gave for registration" required />
                  </label>

                  <label for="work-link-1">
                    Link to your work #1:
                    <input
                      id="work-link-1"
                      name="work-links"
                      type="url"
                      placeholder="Paste one or more url linking to your work"
                      required
                    />
                  </label>
              
                  <label for="work-link-2">
                    Link to your work #2:
                    <input
                      id="work-link-2"
                      name="work-links"
                      type="url"
                    />
                  </label>
              
                  <label for="work-link-3">
                    Link to your work #3:
                    <input
                      id="work-link-3"
                      name="work-links"
                      type="url"
                    />
                  </label>
                      
                <label for="terms-and-conditions">
                  <input class="inline" id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" />
                  I accept the
                  <a href="nonterritorial.foundation">terms and conditions</a>
                </label>
          
                <input type="submit" value="Submit" />
            </fieldset>
        </form>
          
        </section>
        <section class="little-buttons">
            <a href="index.html"><button class="home">Home</button></a>
            <a href="about.html"><button class="about">About</button></a>
            <a href="roadmap.html"><button class="roadmap">Roadmap</button></a>
            <a href="qa.html"><button class="qa">Q&A</button></a>
        </section>
    </main>
    <footer>
        <img src="https://i.imgur.com/sryvdsl.png" alt="Logo" class="logo"> 
    </footer>    
</div>
</body>
</html>
